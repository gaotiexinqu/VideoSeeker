  - class_name: custom_tools.video_tools_local_v4_grid.ViewVisualPromptTool
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "view_visual_prompt"
        description: "View the visual prompt image for the current question."
        parameters:
          type: "object"
          properties:
            frame_path:
              type: "string"
              description: "Path to the visual prompt frame image file"
          required:
            - frame_path
  - class_name: custom_tools.video_tools_local_v4_grid.CropVideoTool
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "crop_video"
        description: "Crop a video to a specified duration."
        parameters:
          type: "object"
          properties:
            video_path:
              type: "string"
              description: "Path to the video file"
            start_time:
              type: "number"
              description: "Start time in seconds"
            end_time:
              type: "number"
              description: "End time in seconds, must be greater than start_time"
          required:
            - video_path
            - start_time
            - end_time